{% extends "auth_base.html" %}
{% block title %}Sign in — AgroSense AI{% endblock %}
{% block auth_content %}
<h1 class="auth-title">Sign in</h1>
<p class="auth-sub">Use your account to access AgroSense AI.</p>
<form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
  {% if request.args.get('next') %}
  <input type="hidden" name="next" value="{{ request.args.get('next') }}"/>
  {% endif %}
  <div class="form-group">
    <label class="form-label" for="username">Username</label>
    <input class="form-input" type="text" id="username" name="username" autocomplete="username" required autofocus/>
  </div>
  <div class="form-group">
    <label class="form-label" for="password">Password</label>
    <input class="form-input" type="password" id="password" name="password" autocomplete="current-password" required/>
  </div>
  <button type="submit" class="btn btn-primary btn-full btn-lg">Sign in</button>
</form>
<p class="auth-footer">No account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
{% endblock %}
