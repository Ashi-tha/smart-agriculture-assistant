{% extends "auth_base.html" %}
{% block title %}Create account — AgroSense AI{% endblock %}
{% block auth_content %}
<h1 class="auth-title">Create account</h1>
<p class="auth-sub">Choose a username and a password (8+ characters).</p>
<form method="post" action="{{ url_for('auth.register') }}" class="auth-form">
  <div class="form-group">
    <label class="form-label" for="username">Username</label>
    <input class="form-input" type="text" id="username" name="username" autocomplete="username" required autofocus placeholder="e.g. farmer_ravi"/>
  </div>
  <div class="form-group">
    <label class="form-label" for="password">Password</label>
    <input class="form-input" type="password" id="password" name="password" autocomplete="new-password" required minlength="8"/>
  </div>
  <div class="form-group">
    <label class="form-label" for="confirm">Confirm password</label>
    <input class="form-input" type="password" id="confirm" name="confirm" autocomplete="new-password" required minlength="8"/>
  </div>
  <button type="submit" class="btn btn-primary btn-full btn-lg">Create account</button>
</form>
<p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
{% endblock %}
